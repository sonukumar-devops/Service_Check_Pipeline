name : Service Health Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Service Image
        run: docker build -f Dockerfile.service -t sonukumardevops/service-app:latest .

      - name: Push Service Image
        run: docker push sonukumardevops/service-app:latest

      - name: Built Checker Image
        run: docker build -f Dockerfile.checker -t sonukymardevops/service-checker:latest .

      - name: Push Checker Image
        run: docker push sonukumardevops/service-checker:latest
